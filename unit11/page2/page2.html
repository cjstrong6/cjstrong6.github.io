<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brochure Form</title>
  <link href="page2.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <header>
    <a href='/unit11/index.html' class='button'>Home</a>
  </header>

  <form>

    <h1>Brochure Form</h1>
    
    <div class='fn' id='fn' style='float:left'>
      <label for='fname'>First Name:</label><br>
      <input type='text' id='fname' name='fname'>
    </div>

    <div class='ln' id='ln' style='float:left'>
      <label for='lname'>Last Name:</label><br>
      <input type='text' id='lname' name='lname'>
    </div>
    <div style="clear:both;">&nbsp;</div><br>

    <div class='a1' id='a1' style='float:left'>
      <label for='address1'>AddressLine1:</label><br>
      <input type='text' id='address1' name='address1'>
    </div>

    <div class='a2' id='a2' style='float:left'>
      <label for='address2'>AddressLine2:</label><br>
      <input type='text' id='address2' name='address2'>
    </div>
    <div style="clear:both;">&nbsp;</div><br>

    <div class='cit' id='cit' style='float:left'>
      <label for='city'>City:</label><br>
      <input type='text' id='city' name='city'>
    </div>

    <div class='sta' id='sta' style='float:left'>
      <label for='state'>State:</label><br>
      <input type='text' id='state' name='state'>
    </div>
    <div style="clear:both;">&nbsp;</div><br>

    <label for='zip'>Zip Code:</label><br>
    <input type='tel' id='zip' name='zip' pattern='[0-9]{5}' maxlength='5' placeholder="12345"><br><br><br>

    <input type='checkbox' id='tos' name='tos' required>
    <label for='tos'>I have read and agree to the Terms of Service & Privacy Policies</label><br><br><br>

    <input type='submit' value='Submit'>
    <input type='reset'>
    
  </form>
</body>
</html>
